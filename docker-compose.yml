version: '3.8'

services:
  # 1. The Postgres Database Service
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: minilink
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  # 2. The Redis Cache Service
  cache:
    image: redis:alpine
    expose:
      - "6379"

  # 3. Web Service Template (Repeated for all 5 instances)
  web1:
    build: .
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/minilink
      - REDIS_URL=redis://cache:6379
    depends_on:
      - db
      - cache

  web2:
    build: .
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/minilink
      - REDIS_URL=redis://cache:6379
    depends_on:
      - db
      - cache

  web3:
    build: .
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/minilink
      - REDIS_URL=redis://cache:6379
    depends_on:
      - db
      - cache

  # 4. NGINX Load Balancer
  loadbalancer:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2
      - web3
    

# Named volume to guarantee database updates persist if containers restart
volumes:
  postgres_data: