version: '3.8'

services:
  
  web1:
    build: .
    volumes:
      - ./sqlite_data:/app/db_volume
    environment:
      - DATABASE_URL=sqlite:////app/db_volume/minilink.db

  web2:
    build: .
    volumes:
      - ./sqlite_data:/app/db_volume
    environment:
      - DATABASE_URL=sqlite:////app/db_volume/minilink.db

  web3:
    build: .
    volumes:
      - ./sqlite_data:/app/db_volume
    environment:
      - DATABASE_URL=sqlite:////app/db_volume/minilink.db

  loadbalancer:
    image: nginx:latest
    ports:
      - "8080:80" # Exposes NGINX load balancer on your machine's port 8080
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2
      - web3
      
      