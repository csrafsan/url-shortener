version: '3.8'

services:
  cache:
    image: redis:alpine
    expose:
      - "6379"
  
  web1:
    build: .
    volumes:
      - ./sqlite_data:/app/db_volume
    environment:
      - DATABASE_URL=sqlite:////app/db_volume/minilink.db
      - REDIS_URL=redis://cache:6379

  web2:
    build: .
    volumes:
      - ./sqlite_data:/app/db_volume
    environment:
      - DATABASE_URL=sqlite:////app/db_volume/minilink.db
      - REDIS_URL=redis://cache:6379

  web3:
    build: .
    volumes:
      - ./sqlite_data:/app/db_volume
    environment:
      - DATABASE_URL=sqlite:////app/db_volume/minilink.db
      - REDIS_URL=redis://cache:6379

  loadbalancer:
    image: nginx:latest
    ports:
      - "8080:80" # Exposes NGINX load balancer on your machine's port 8080
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2
      - web3
      
      